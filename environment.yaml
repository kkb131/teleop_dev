# Conda environment for Operator PC (조종 PC)
# teleop_dev sender 실행 환경 — ROS2 불필요
#
# 실행 예시:
#   python3 -m sender.arm.vive_sender     --target-ip <ROBOT_IP>
#   python3 -m sender.arm.keyboard_sender  --target-ip <ROBOT_IP>
#   python3 -m sender.arm.joystick_sender  --target-ip <ROBOT_IP>
#   python3 -m sender.hand.manus_sender    --target-ip <ROBOT_IP>
#
# Setup:
#   conda env create -f environment.yaml
#   conda activate teleop_operator

name: teleop_operator
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - libusb                  # Manus SDK (libManusSDK.so)
  - pip
  - pip:
    - openvr>=1.26.701      # SteamVR / Vive Tracker (vive_sender)
    - "numpy<2"             # 좌표변환, 쿼터니언 연산 (pinocchio ABI 호환 위해 <2 필수)
    - pynput>=1.7.6         # 키보드 입력 (vive_sender KeyboardStateTracker)
    - pyyaml>=6.0           # Vive/Manus config 파싱
    - pygame>=2.0.0         # 조이스틱/게임패드 입력 (joystick_sender)
    - scipy>=1.10.0         # 벡터 retarget 최적화 (manus_sender --retarget vector)
    - pin>=2.7.0            # pinocchio FK/IK (manus_sender --retarget vector) ※ pip install pinocchio는 다른 패키지!
