<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Robot Launcher</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body data-page="index">
  <header>
    <h1><a href="/">🤖 Robot Launcher</a></h1>
    <button id="start-all" class="primary">▶ 전체 시작</button>
    <button id="stop-all">■ 전체 정지</button>
    <div class="spacer"></div>
    <button id="estop" class="estop">E-STOP</button>
  </header>
  <div id="banner"></div>

  <main>
    <div id="cards" class="grid"></div>

    <div class="logpanel">
      <div class="bar">
        <span>로그:</span>
        <select id="log-select"></select>
        <button id="log-clear">지우기</button>
      </div>
      <pre id="log"></pre>
    </div>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
