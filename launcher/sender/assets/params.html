<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XR 파라미터</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body data-page="params">
  <header>
    <h1><a href="/">← 대시보드</a></h1>
    <span style="font-weight:700">XR 파라미터 (xr_dual.yaml)</span>
    <div class="spacer"></div>
  </header>
  <div id="banner"></div>

  <main>
    <div class="notice">
      저장 후 <b>러너 재시작</b> 시 적용됩니다. ⚠ 주황 항목은 안전 관련 —
      왼팔 튜닝은 <b>docs/xr_dual_arm_left_tuning_ko.md</b> 절차를 따르세요.
      제스처 기능은 파지 중 오발동 위험이 있어 기본 비활성입니다.
    </div>
    <div class="card">
      <div id="form" class="params-grid">로딩...</div>
      <div style="display:flex; gap:10px; margin-top:14px; align-items:center;">
        <button id="save" class="primary big">저장</button>
        <span id="save-note" style="font-size:12px;color:var(--muted)"></span>
      </div>
    </div>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
