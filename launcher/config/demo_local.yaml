# 런처 자체 검증용 더미 구성 — 하드웨어/ROS 불필요.
#   agent:  python3 -m launcher agent --config launcher/config/demo_local.yaml
#   GUI:    python3 -m launcher gui --config launcher/config/demo_local.yaml --profile local

version: 1

network:
  robot_pc_ip: "127.0.0.1"
  agent_port: "19876"

vars: {}

setups:
  hello: "echo '[setup] hello snippet'"

agent:
  host: "127.0.0.1"
  port: 19876
  token: ""

defaults:
  stop_grace_s: 2.0

components:
  - name: demo-driver
    group: robot
    setup: [hello]
    command: "python3 -u -c 'import time,itertools;
      [print(\"driver tick\", i, flush=True) or time.sleep(1) for i in itertools.count()]'"
    start_delay_s: 1.0

  - name: demo-receiver
    group: robot
    command: "python3 -u -c 'import time,itertools;
      [print(\"receiver tick\", i, flush=True) or time.sleep(1) for i in itertools.count()]'"
    depends_on: [demo-driver]

  - name: demo-oneshot
    group: operator
    command: "echo one-shot done"
    oneshot: true

  - name: demo-pty
    group: operator
    use_pty: true
    command: "python3 -u -c 'import sys; print(\"pty:\", sys.stdin.isatty(), flush=True);
      [print(\"got\", repr(l.strip()), flush=True) for l in sys.stdin]'"
    depends_on: [demo-oneshot]
