robot:
  ip: "192.168.0.2"
  mode: "sim"

control:
  frequency_sim: 50
  frequency_rtde: 125

input:
  type: "keyboard"           # "keyboard" or "unified"
  cartesian_step: 0.01       # m per key press (keyboard mode)
  rotation_step: 0.05        # rad per key press (keyboard mode)
  unified_port: 9871         # UDP port (unified mode — matches TeleopPosePacket / sender_base default)

filter:
  alpha_position: 0.85
  alpha_orientation: 0.85

ik:
  position_cost: 1.0
  orientation_cost: 0.5
  posture_cost: 1.0e-2
  damping: 1.0e-12
  soft_sync_alpha: 0.05      # IK drift correction blend rate (0~1, higher = faster correction)
  impedance_lookahead: 0.15  # seconds — IK solve virtual dt for spring distance

safety:
  packet_timeout_ms: 2000      # keyboard is event-based; hold torque between keypresses
  max_joint_vel: 1.0
  max_position_deviation: 0.3  # rad — max deviation q_desired vs q_actual
  max_ee_velocity: 0.2
  workspace:
    x: [-0.8, 0.8]
    y: [-0.8, 0.8]
    z: [0.05, 1.2]

impedance:
  default_preset: "SOFT"         # start safe
  gain_scale_range: [0.25, 2.0]
  enable_coriolis_comp: true
  max_joint_error: [0.20, 0.20, 0.15, 0.30, 0.30, 0.55]  # rad — sized so STIFF reaches TORQUE_LIMITS

initial_pose:
  # 스크립트 시작 시 아래 joint_values 로 이동 후 control loop 시작.
  # admittance 와 동일 패턴. 단 RTDE mode (URScript torque relay) 에서는 init
  # move 가 지원되지 않아 enabled=true 라도 자동 skip + 경고 (사용자가 robot 을
  # teach pendant 로 미리 위치시키거나, --no-init-move 권장). Sim mode 에서는
  # backend.send_joint_command 로 보간 이동.
  enabled: true                  # move on startup (sim mode only; rtde 는 자동 skip)
  joint_values:                  # UR10e 6 joint angles (rad): shoulder_pan ... wrist_3
    [2.24, -1.2808, 2.16, -0.8848, 2.24, 0.0]   # = robot.config.HOME_JOINTS
  move_duration_s: 3.0           # 보수적 default — safety.max_joint_vel 1.0 rad/s 와 호환
