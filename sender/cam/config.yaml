# sender/cam 기본 설정 — 로봇 PC 카메라 스트림 수신 + 브라우저/VR 서빙
#
# 사용:
#   python3 -m sender.cam.main --robot-ip <ROBOT_IP>
#   브라우저 뷰: http://localhost:8014/
#   VR (기존 텔레옵 세션 통합): sender/xr_common/config.yaml 의 cam.enabled: true
#   헤드셋 USB 모드: adb reverse tcp:8014 tcp:8014 (8013 과 별개로 추가 필요)

zmq:
  robot_ip: 192.168.0.2     # 로봇 PC IP
  port: 9873                # robot/cam config 의 stream.port 와 일치
  cameras: [head]           # 구독 topic 리스트. 순서 = cam index = vr.yaw_deg 인덱스
  # cameras: [head, left_wrist, right_wrist]

http:
  port: 8014
  ws_max_fps: 30            # WS 클라이언트당 push 상한 (fps)

vr:
  # head_locked  — 화면이 머리를 따라옴 (기존 방식)
  # world_locked — 세션 시작 시점 위치에 화면 고정 (머리 움직여도 그대로).
  #                POST /recenter 또는 브라우저 뷰의 Recenter 버튼으로 재정렬.
  mode: head_locked
  plane_distance_m: 1.0     # 시점(anchor)으로부터 plane 거리
  plane_width_m: 1.06       # 640x480 → 4:3
  plane_height_m: 0.8
  plane_height_offset_m: 0.0
  yaw_deg: [0, -40, 40]     # 카메라별 좌우 배치 각도 (index 순. +=왼쪽)
