# Tesollo DG-5F retargeting config (WebXR 25-joint → 20 DG-5F joint), right + left.
#
# 출처: xr_teleop/assets/dg5f_hand/dg5f_right.yml — DexPilot 검증 설정 (의도된 값).
# Phase B5 (2026-05-19) 에서 left block 추가 + 파일명 dg5f_right_xr.yml → dg5f_xr.yml 리네임.
#
# 주요 결정 (xr_teleop Week 4 U5+ / U5++):
#   - type: DexPilot (vector 보다 pinch 정확도 우월, retarget_dev/docs/dg5f_tuning.md)
#   - urdf: dg5f_{right,left}_retarget.urdf (PIP/DIP lower=0 으로 음수 영역 제거)
#   - scaling_factor: 1.2 (DG-5F 가 사람 손 ~1.2배 큼 → 사람 손 확대해 매칭)
#   - low_pass_alpha: 0.2 (스무딩, jitter 완화)
#
# ★ Phase B4 (2026-05-19) 진단: dex_retargeting 0.5.0 의 DexPilot 이
#   target_link_human_indices 명시 누락 시 MANO 21-joint 가정 (`* 4`) 으로
#   auto-generate — fingertip 을 [4, 8, 12, 16, 20] 으로 잘못 선택. 우리 입력은
#   WebXR 25-joint 라 fingertip 이 [4, 9, 14, 19, 24]. 명시로 강제 (docs/vr_teleop/xr_spike/B4_indices_fix.md).
#
# WebXR 25-joint fingertip 인덱스 (각 finger 5 keypoint: metacarpal/proximal/intermediate/distal/tip):
#   wrist=0, thumb=4, index=9, middle=14, ring=19, pinky=24
#
# 주의: xr_teleop 원본 yml 은 `target_link_human_indices_dexpilot` (잘못된 suffix)
# 키 사용 — dex_retargeting 의 RetargetingConfig.from_dict 는 정확한 키 이름
# `target_link_human_indices` 만 인식하므로 silently ignored. 본 파일은 정확한
# 키 이름 사용.
#
# right / left 차이:
#   - urdf_path: dg5f_{right,left}_retarget.urdf
#   - wrist_link_name: {rl,ll}_dg_palm
#   - finger_tip_link_names: {rl,ll}_dg_*_tip
#   - target_link_human_indices: 동일 (WebXR human keypoint 기준이라 hand_side 무관)
#   - scaling_factor / low_pass_alpha: 동일

right:
  type: DexPilot
  # urdf_path 는 RetargetingConfig.set_default_urdf_dir(...) 가 가리키는 dir 기준 상대 경로.
  # XRDexRetargeter 는 default 로 본 파일이 있는 dir 를 urdf_dir 로 설정.
  urdf_path: dg5f_right_retarget.urdf

  # DexPilot 필수: wrist + 5 fingertip link
  wrist_link_name: "rl_dg_palm"
  finger_tip_link_names:
    - "rl_dg_1_tip"  # Thumb
    - "rl_dg_2_tip"  # Index
    - "rl_dg_3_tip"  # Middle
    - "rl_dg_4_tip"  # Ring
    - "rl_dg_5_tip"  # Pinky

  # WebXR 25-joint 의 (origin, task) pair indices — 명시 필수.
  #   row 0 (origin): 10 finger-pair-distance origin + 5 wrist-to-tip origin (wrist=0)
  #   row 1 (task)  : 10 finger-pair-distance task   + 5 wrist-to-tip task   (tip)
  # 10 pair-distance: (4-9), (4-14), (4-19), (4-24), (9-14), (9-19), (9-24), (14-19), (14-24), (19-24)
  # 5  wrist-to-tip: (0-4), (0-9), (0-14), (0-19), (0-24)
  target_link_human_indices:
    - [ 9, 14, 19, 24, 14, 19, 24, 19, 24, 24,  0,  0,  0,  0,  0]
    - [ 4,  4,  4,  4,  9,  9,  9, 14, 14, 19,  4,  9, 14, 19, 24]

  # 사람 손 ~1.2배 확대 (DG-5F 가 1.2~1.3배 큼)
  scaling_factor: 1.2
  # 작을수록 smooth, latency ↑
  low_pass_alpha: 0.2

left:
  type: DexPilot
  urdf_path: dg5f_left_retarget.urdf

  # DexPilot 필수: wrist + 5 fingertip link (left prefix ll_dg_*)
  wrist_link_name: "ll_dg_palm"
  finger_tip_link_names:
    - "ll_dg_1_tip"  # Thumb
    - "ll_dg_2_tip"  # Index
    - "ll_dg_3_tip"  # Middle
    - "ll_dg_4_tip"  # Ring
    - "ll_dg_5_tip"  # Pinky

  # WebXR 25-joint indices — hand_side 무관 (WebXR human keypoint 인덱싱 기준).
  # right 와 완전 동일. xr_remap 의 MEDIAPIPE_OPERATOR2MANO_LEFT 가 chirality 차이 흡수.
  target_link_human_indices:
    - [ 9, 14, 19, 24, 14, 19, 24, 19, 24, 24,  0,  0,  0,  0,  0]
    - [ 4,  4,  4,  4,  9,  9,  9, 14, 14, 19,  4,  9, 14, 19, 24]

  scaling_factor: 1.2
  low_pass_alpha: 0.2
