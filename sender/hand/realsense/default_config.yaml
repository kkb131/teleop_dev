# Default config for realsense_sender
#
# Run:
#   python3 -m sender.hand.realsense_sender --target-ip <ROBOT_PC_IP>

network:
  target_ip: "192.168.0.10"
  port: 9872
  hz: 30                  # D405 native rate; raising above 30 just wastes CPU

hand:
  side: "right"           # "left" or "right" (single hand at a time)

camera:
  serial: null            # null = auto-detect first connected D405
  width: 640
  height: 480
  fps: 30

retarget:
  optimizer: "dexpilot"   # "dexpilot" (thumb-pinch focused) or "vector" (multi-task)

display:
  viz: false              # set true for OpenCV preview window (--viz CLI override)
